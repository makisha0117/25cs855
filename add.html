<!DOCTYPE html>
<html>
<head>
</head>
<body>
num 1<input type="text"id="num1">
num 2<input type="text"id="num2">
<input type="button" value="add" onclick="sum()">
<input type="button" value="subract" onclick="sub()">

<input type="button" value="multiply" onclick="mul()">
<input type="button" value="divison" onclick="div()">
<p id="res"></p>
<script>
    function sum(){
        var a= document.getElementById("num1").value;
        var b=document.getElementById("num2").value;
        document.getElementById("res").innerHTML=parseInt(a)+parseInt(b);
    

    }
    function sub(){
        var a= document.getElementById("num1").value;
        var b=document.getElementById("num2").value;
        document.getElementById("res").innerHTML=parseInt(a)-parseInt(b);
    

    }
    function mul(){
        var a= document.getElementById("num1").value;
        var b=document.getElementById("num2").value;
        document.getElementById("res").innerHTML=parseInt(a)*parseInt(b);
    

    }
    function div(){
        var a= document.getElementById("num1").value;
        var b=document.getElementById("num2").value;
        document.getElementById("res").innerHTML=parseInt(a)/parseInt(b);
    

    }
    
   

</script>

</body>   
</html>
